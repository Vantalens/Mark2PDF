<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mark2PDF</title>
    <meta name="description" content="拖拽 Markdown 文档，在线预览并导出 PDF。" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- 顶部导航 -->
      <header class="app-header">
        <div class="header-content">
          <h1 class="app-title">Mark2PDF</h1>
          <p class="app-subtitle">Markdown to PDF · 中文 · 公式 · 代码高亮</p>
        </div>
        <div class="header-actions">
          <div class="status-indicator" id="statusText">就绪</div>
          <button id="generatePdfButton" class="primary-button" type="button">生成 PDF</button>
          <a id="downloadPdfButton" class="secondary-button disabled" href="#" download>下载</a>
        </div>
      </header>

      <!-- 主工作区：三列布局 -->
      <div class="workspace">
        <!-- 左列：编辑 -->
        <article class="panel editor-panel">
          <div class="panel-header">
            <h2>Markdown 源文档</h2>
            <div class="file-meta" id="fileMeta">未上传</div>
          </div>

          <label class="drop-zone" id="dropZone" for="fileInput">
            <input id="fileInput" type="file" accept=".md,.markdown,text/markdown" hidden />
            <div class="drop-zone-inner">
              <div class="drop-icon">⇪</div>
              <strong>拖拽文件或点击上传</strong>
            </div>
          </label>

          <textarea id="markdownInput" spellcheck="false" placeholder="在这里编辑 Markdown..."></textarea>

          <div class="panel-footer">
            <div class="word-count">
              <span id="wordCount">字数: 0</span>
              <span id="lineCount">行数: 0</span>
            </div>
            <button id="loadSampleButton" class="ghost-button small" type="button">加载示例</button>
          </div>
        </article>

        <!-- 中列：预览 -->
        <article class="panel preview-panel">
          <div class="panel-header">
            <h2>预览结果</h2>
            <div class="preview-controls">
              <label class="checkbox-label" for="autoPreviewCheckbox">
                <input id="autoPreviewCheckbox" type="checkbox" />
                自动
              </label>
              <button id="refreshPreviewButton" class="ghost-button small" type="button">刷新</button>
              <button id="editPreviewButton" class="ghost-button small" type="button">编辑</button>
            </div>
          </div>

          <div id="htmlPreview" class="preview-frame preview-markdown" aria-label="Markdown 预览"></div>
        </article>

        <!-- 右列：PDF -->
        <article class="panel pdf-panel">
          <div class="panel-header">
            <h2>PDF 输出</h2>
            <div class="file-meta" id="pdfMeta">未生成</div>
          </div>

          <div class="pdf-preview-wrapper">
            <button id="openPdfPreviewButton" class="ghost-button" type="button" style="margin-bottom: 12px; width: 100%;">
              📄 加载 PDF 预览
            </button>
            <iframe id="pdfPreview" title="PDF 预览" class="preview-frame pdf-frame"></iframe>
          </div>
        </article>
      </div>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
