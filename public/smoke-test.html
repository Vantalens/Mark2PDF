<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trans2Former Browser Smoke Test</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: system-ui, "Segoe UI", sans-serif;
        color: #17202a;
        background: #f6f8fb;
      }

      main {
        max-width: 880px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      #status {
        margin: 16px 0;
        padding: 12px 14px;
        border: 1px solid #cbd5e1;
        background: #fff;
      }

      #status[data-state="pass"] {
        border-color: #15803d;
        color: #166534;
      }

      #status[data-state="fail"] {
        border-color: #b91c1c;
        color: #991b1b;
      }

      ol {
        padding-left: 22px;
      }

      li {
        margin: 6px 0;
      }

      pre {
        padding: 12px;
        overflow: auto;
        background: #0f172a;
        color: #e2e8f0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Trans2Former Browser Smoke Test</h1>
      <p>这个页面在浏览器内执行转换链路自检，不依赖服务端转换、Electron 或 Playwright。</p>
      <div id="status" data-state="running">正在运行浏览器端 smoke test...</div>
      <ol id="results"></ol>
      <pre id="details" hidden></pre>
    </main>

    <script type="module" src="/smoke-test.js"></script>
  </body>
</html>
